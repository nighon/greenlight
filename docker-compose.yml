# version: '3.8'

services:
  db:
    image: postgres:15.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-greenlight}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    environment:
      MH_API_BIND_ADDR: ${MH_API_BIND_ADDR:-0.0.0.0:8025}
      MH_SMTP_BIND_ADDR: ${MH_SMTP_BIND_ADDR:-0.0.0.0:1025}
    ports:
      - "1025:1025"
      - "8025:8025"

  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL:-postgres://postgres:password@db:5432/greenlight?sslmode=disable}
  #   depends_on:
  #     - db
  #   ports:
  #     - "8080:8080"

volumes:
  postgres_data:
